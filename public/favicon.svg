<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Leaf: grows from bottom-center, curves to a point at top -->
  <path
    d="M16 28 C16 28, 6 22, 6 14 C6 7, 11 3, 16 2 C21 3, 26 7, 26 14 C26 22, 16 28, 16 28 Z"
    fill="#406e29"
  />
  <!-- Center vein -->
  <line x1="16" y1="28" x2="16" y2="5" stroke="#d9e0d5" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Left veins -->
  <line x1="16" y1="11" x2="10" y2="15" stroke="#d9e0d5" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="16" x2="9"  y2="19" stroke="#d9e0d5" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="21" x2="11" y2="23" stroke="#d9e0d5" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Right veins -->
  <line x1="16" y1="11" x2="22" y2="15" stroke="#d9e0d5" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="16" x2="23" y2="19" stroke="#d9e0d5" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="21" x2="21" y2="23" stroke="#d9e0d5" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
</svg>
